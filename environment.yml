# Conda env for MuJoCo inference (GenLoco policy *.pt).
# Create: conda env create -f environment.yml
# Activate: conda activate genloco_mujoco
# GPU PyTorch: after create, install CUDA build matching your driver, e.g.
#   pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu128
name: genloco_mujoco
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - numpy>=1.23
  - mujoco>=3.1.0
  - pip:
    # PyTorch: keep CPU wheels by default; replace with CUDA index URL on GPU machines.
    - torch
    - torchvision
    - torchaudio
